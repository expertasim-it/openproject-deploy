version: "3.7"

networks:
  acestep_network:
    driver: bridge

volumes:
  acestep_models:
  acestep_outputs:

services:
  acestep:
    build:
      context: .
      dockerfile: Dockerfile.acestep
    restart: unless-stopped
    networks:
      - acestep_network
    ports:
      - "8001:8001"
      - "7860:7860"
    volumes:
      - acestep_models:/app/models
      - acestep_outputs:/app/outputs
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - video
    environment:
      PYTHONUNBUFFERED: "1"
      ONEAPI_DEVICE_SELECTOR: "level_zero:0"
