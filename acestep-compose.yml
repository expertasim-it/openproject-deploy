version: "3.7"

networks:
  acestep_network:
    driver: bridge

volumes:
  acestep_checkpoints:
  acestep_outputs:

services:
  acestep:
    image: ghcr.io/ace-step/ace-step-1.5:latest
    restart: unless-stopped
    networks:
      - acestep_network
    ports:
      - "7860:7860"
    volumes:
      - acestep_checkpoints:/app/checkpoints
      - acestep_outputs:/app/outputs
    environment:
      PYTHONUNBUFFERED: "1"
