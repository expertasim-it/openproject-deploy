version: "3.7"

networks:
  social_network:
    external: true
    name: social-stack_social_network

volumes:
  session_data:

services:
  session-manager:
    build:
      context: .
      dockerfile: Dockerfile.sessionmanager
    restart: unless-stopped
    networks:
      - social_network
    ports:
      - "8767:8767"
    volumes:
      - session_data:/app/sessions
    environment:
      PYTHONUNBUFFERED: "1"
