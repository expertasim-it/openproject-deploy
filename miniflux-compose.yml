version: "3.7"

networks:
  miniflux_network:

volumes:
  miniflux_db:

services:
  miniflux_db:
    image: postgres:15
    restart: unless-stopped
    networks:
      - miniflux_network
    volumes:
      - miniflux_db:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: miniflux
      POSTGRES_USER: miniflux
      POSTGRES_PASSWORD: miniflux123

  miniflux:
    image: miniflux/miniflux:latest
    restart: unless-stopped
    networks:
      - miniflux_network
    ports:
      - "8359:8080"
    environment:
      DATABASE_URL: "postgres://miniflux:miniflux123@miniflux_db/miniflux?sslmode=disable"
      RUN_MIGRATIONS: "1"
      CREATE_ADMIN: "1"
      ADMIN_USERNAME: "admin"
      ADMIN_PASSWORD: "Admin1234."
    depends_on:
      - miniflux_db
