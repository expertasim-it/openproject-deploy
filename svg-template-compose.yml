version: "3.7"

networks:
  social_network:
    driver: bridge

volumes:
  svg_templates:
  svg_outputs:

services:
  svg-templater:
    image: python:3.11-slim
    restart: unless-stopped
    networks:
      - social_network
    ports:
      - "8765:8765"
    volumes:
      - svg_templates:/app/templates
      - svg_outputs:/app/outputs
    working_dir: /app
    environment:
      FLASK_ENV: production
      PYTHONUNBUFFERED: "1"
    command: >
      sh -c "pip install flask lxml -q &&
             python -c \"
import os, urllib.request
os.makedirs('/app/templates', exist_ok=True)
os.makedirs('/app/outputs', exist_ok=True)
url='https://raw.githubusercontent.com/expertasim-it/openproject-deploy/main/svg-server.py'
urllib.request.urlretrieve(url, '/app/server.py')
print('Downloaded server.py')
\" && python /app/server.py"
