version: "3.7"

networks:
  social_network:
    driver: bridge

volumes:
  svg_templates:
  svg_outputs:

services:
  svg-templater:
    build:
      context: .
      dockerfile: Dockerfile.svg
    restart: unless-stopped
    networks:
      - social_network
    ports:
      - "8765:8765"
    volumes:
      - svg_templates:/app/templates
      - svg_outputs:/app/outputs
    environment:
      FLASK_ENV: production
      PYTHONUNBUFFERED: "1"
