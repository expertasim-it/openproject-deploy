version: "3.7"

networks:
  social_network:
    driver: bridge

volumes:
  svg_templates:
  svg_outputs:

services:
  svg-templater:
    image: python:3.11-slim
    restart: unless-stopped
    networks:
      - social_network
    ports:
      - "8765:8765"
    volumes:
      - svg_templates:/app/templates
      - svg_outputs:/app/outputs
    working_dir: /app
    environment:
      FLASK_ENV: production
    command: >
      sh -c "pip install flask lxml -q &&
             cat > /app/server.py << 'PYEOF'
from flask import Flask, request, jsonify
import os
from datetime import datetime

app = Flask(__name__)
TEMPLATES_DIR = '/app/templates'
OUTPUTS_DIR = '/app/outputs'
os.makedirs(TEMPLATES_DIR, exist_ok=True)
os.makedirs(OUTPUTS_DIR, exist_ok=True)

def create_templates():
    t1 = '''<svg width=\"1080\" height=\"1080\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"1080\" height=\"1080\" fill=\"{{BACKGROUND_COLOR}}\"/><text x=\"540\" y=\"200\" font-size=\"72\" font-weight=\"bold\" fill=\"{{TEXT_COLOR}}\" text-anchor=\"middle\">{{HEADLINE}}</text><text x=\"540\" y=\"320\" font-size=\"42\" fill=\"{{TEXT_COLOR}}\" text-anchor=\"middle\">{{SUBHEAD}}</text><rect x=\"340\" y=\"800\" width=\"400\" height=\"80\" rx=\"40\" fill=\"{{ACCENT_COLOR}}\"/><text x=\"540\" y=\"852\" font-size=\"36\" fill=\"{{BACKGROUND_COLOR}}\" text-anchor=\"middle\">{{CTA}}</text><text x=\"540\" y=\"980\" font-size=\"28\" fill=\"{{TEXT_COLOR}}\" text-anchor=\"middle\">{{DATE}}</text></svg>'''
    with open(f'{TEMPLATES_DIR}/social-post.svg', 'w') as f:
        f.write(t1)

create_templates()

@app.route('/health')
def health():
    return jsonify({'status': 'ok'})

@app.route('/templates')
def list_templates():
    return jsonify({'templates': os.listdir(TEMPLATES_DIR)})

@app.route('/generate', methods=['POST'])
def generate():
    data = request.json
    tid = data.get('template_id', 'social-post')
    variables = data.get('variables', {})
    variables.setdefault('date', datetime.now().strftime('%B %d, %Y'))
    variables.setdefault('background_color', '#1a1a2e')
    variables.setdefault('text_color', '#ffffff')
    variables.setdefault('accent_color', '#e94560')
    tp = f'{TEMPLATES_DIR}/{tid}.svg'
    if not os.path.exists(tp):
        return jsonify({'error': 'Template not found'}), 404
    with open(tp) as f:
        svg = f.read()
    for k, v in variables.items():
        svg = svg.replace('{{' + k.upper() + '}}', str(v))
    ts = datetime.now().strftime('%Y%m%d_%H%M%S')
    out = f'{OUTPUTS_DIR}/{tid}_{ts}.svg'
    with open(out, 'w') as f:
        f.write(svg)
    return jsonify({'status': 'success', 'output_file': out})

app.run(host='0.0.0.0', port=8765)
PYEOF
             python /app/server.py"
